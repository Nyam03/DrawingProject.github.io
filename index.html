<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Collaborative Pro Paint - V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <header id="topbar">
    <div class="logo">PRO DRAW</div>
    <div class="page-tabs" id="pageTabs">
      </div>
    <div class="actions">
      <button id="addPage" class="small-btn">+ Page</button>
      <button id="export" class="primary-btn">Export PNG</button>
    </div>
  </header>

  <div id="main-container">
    <aside id="toolbar">
      <div class="tool-group">
        <label>Tools</label>
        <button id="brush" class="tool-btn active" title="Brush">🖌️</button>
        <button id="eraser" class="tool-btn" title="Eraser">🧼</button>
        <button id="bucket" class="tool-btn" title="Paint Bucket">🪣</button>
        <button id="lasso" class="tool-btn" title="Lasso">✂️</button>
      </div>
      <div class="tool-group">
        <label>Color</label>
        <input type="color" id="color" value="#000000">
      </div>
      <div class="tool-group">
        <label>BG Color</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="tool-group">
        <label>Size (px)</label>
        <input type="number" id="size" min="1" max="100" value="5" class="size-input">
      </div>
      <div class="info">
        <p>Zoom: <span id="zoomLevel">100%</span></p>
      </div>
    </aside>

    <main id="viewport">
      <div id="canvasWrapper">
        <div id="canvasContainer"></div>
      </div>
    </main>

    <aside id="layersPanel">
      <div class="panel-header">
        <span>Layers</span>
        <button id="addLayer" class="small-btn">+</button>
      </div>
      <div id="layersList"></div>
    </aside>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
